<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba minima OpenLayers</title>
  <link rel="stylesheet" href="ol.css">
  <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=Uc129TKk_CtEt5mOt8a5YefeFxzINfXxWCbxznBt1LWoPxQndcMzkhTDshy9Rks_TxeqT0jIFTqXUT3aGROq8qKRZ0yLpFait6wxaEAfoJcNQt8OeotRoqf0k6gE4gbHjxSRlfOajNFXWkE09uh8BKoF65qqRLHpXEc2emJ133gk7fHXs7s_xbKeGywvbrPVhQZVi26UwU4jAtPxEWic4_8Io-Z0s1Ua9tlGntEzhdVeMR8GkEKLqBUHRWviEWHl_rnQJin_mjHBHV7HVkZR7w" charset="UTF-8"></script><style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#eef3f9;
      color:#1f2937;
    }
    .wrap{
      max-width:1100px;
      margin:24px auto;
      padding:0 16px;
    }
    .card{
      background:#fff;
      border:1px solid #d9e2ef;
      border-radius:16px;
      overflow:hidden;
    }
    .head{
      padding:14px 16px;
      border-bottom:1px solid #d9e2ef;
      background:#f8fbff;
      color:#123c7a;
      font-weight:bold;
    }
    #map{
      width:100%;
      height:600px;
      background:#e5edf7;
    }
    .note{
      padding:14px 16px;
      color:#6b7280;
      font-size:14px;
    }
    @media (max-width: 768px){
      #map{height:420px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">Prueba mínima del visor</div>
      <div id="map"></div>
      <div class="note" id="estado">Cargando mapa base...</div>
    </div>
  </div>

  <script src="ol.js"></script>
  <script>
    const estado = document.getElementById("estado");

    try {
      if (typeof ol === "undefined") {
        estado.textContent = "OpenLayers no cargó. Revise ol.js y ol.css.";
      } else {
        const mapa = new ol.Map({
          target: "map",
          layers: [
            new ol.layer.Tile({
              source: new ol.source.OSM()
            })
          ],
          view: new ol.View({
            center: ol.proj.fromLonLat([-106.453050, 31.734983]),
            zoom: 10
          })
        });

        setTimeout(function(){
          mapa.updateSize();
        }, 500);

        estado.textContent = "Si ve el mapa base, entonces OpenLayers local funciona correctamente.";
      }
    } catch (error) {
      estado.textContent = "El visor mínimo falló: " + error.message;
      console.error(error);
    }
  </script>
</body>
</html>
